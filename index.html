<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bollywood Classics Catalog</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ========== HEADER ========== -->
  <header>
    <h1 class="site-title">🎬 Bollywood Classics</h1>
    <p class="site-subtitle">A personal catalog of films I grew up watching</p>

    <!-- Decorative gold ornament divider between subtitle and search bar -->
    <div class="header-divider">
      <span class="header-divider-dot"></span>
      <span class="header-divider-dot"></span>
      <span class="header-divider-dot"></span>
    </div>

    <!-- Search bar — SVG icon inside the pill, no attached button -->
    <div class="search-container">
      <svg class="search-icon" aria-hidden="true" viewBox="0 0 20 20" fill="none"
           xmlns="http://www.w3.org/2000/svg">
        <circle cx="8.5" cy="8.5" r="5" stroke="currentColor" stroke-width="1.5"/>
        <line x1="12.5" y1="12.5" x2="17" y2="17" stroke="currentColor"
              stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input
        type="text"
        id="search-input"
        placeholder="Search by movie title..."
        autocomplete="off"
      />
    </div>
  </header>

  <!-- ========== PAGE BODY: SIDEBAR + GRID ========== -->
  <div class="page-body">

    <!-- SIDEBAR — sticky, always visible while scrolling -->
    <aside class="sidebar">
      <p class="sidebar-heading">Filter</p>
      <p class="sidebar-sub">Browse by genre</p>
      <p class="filter-label">Genre</p>
      <div class="filter-buttons">
        <!-- data-genre is read by JS to know what to filter.
             JS also injects a count badge inside each button. -->
        <button class="filter-btn active" data-genre="All">All Films</button>
        <button class="filter-btn" data-genre="Romance">Romance</button>
        <button class="filter-btn" data-genre="Comedy">Comedy</button>
        <button class="filter-btn" data-genre="Drama">Drama</button>
        <button class="filter-btn" data-genre="Action">Action</button>
      </div>
    </aside>

    <!-- MAIN CONTENT — results count + poster grid -->
    <main class="content-area">
      <p class="results-info" id="results-count">Loading films...</p>
      <div id="movie-grid"></div>
    </main>

  </div>

  <!-- ========== FOOTER ========== -->
  <footer>
    <p>Films my family played on repeat &mdash; cataloged by Aryan Desai</p>
  </footer>

  <!-- ========== MOVIE DETAIL MODAL ========== -->
  <div id="modal-overlay" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-box">
      <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>

      <div class="modal-poster-side">
        <img id="modal-poster" src="" alt="" />
      </div>

      <div class="modal-info-side">
        <h2 class="modal-title" id="modal-title"></h2>

        <div class="modal-meta">
          <span class="modal-year" id="modal-year"></span>
          <span class="genre-badge" id="modal-genre"></span>
          <span class="modal-lang" id="modal-lang"></span>
        </div>

        <div class="modal-stars-row">
          <span class="card-stars" id="modal-stars"></span>
          <span class="card-rating-num" id="modal-rating"></span>
        </div>

        <p class="modal-section-label">Director</p>
        <p class="modal-director-name" id="modal-director"></p>

        <p class="modal-section-label">Cast</p>
        <div class="modal-cast-tags" id="modal-cast"></div>

        <p class="modal-description" id="modal-description"></p>
      </div>
    </div>
  </div>

  <!-- Script at end of body so DOM elements above exist when it runs -->
  <script src="scripts.js"></script>

</body>
</html>
