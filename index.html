<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bollywood Classics Catalog</title>
    <meta
      name="description"
      content="A catalog of Bollywood movies I grew up watching"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="main-header">
      <h1 class="title">Bollywood Classics</h1>
      <p class="tagline">Films I grew up watching</p>
    </header>

    <div class="page-body">
      <aside class="sidebar">
        <h2>Filter</h2>
        <p class="sidebar-note">Browse by genre</p>
        <div class="filter-buttons">
          <button type="button" class="filter-btn active" data-genre="All">All Films</button>
          <button type="button" class="filter-btn" data-genre="Romance">Romance</button>
          <button type="button" class="filter-btn" data-genre="Comedy">Comedy</button>
          <button type="button" class="filter-btn" data-genre="Drama">Drama</button>
          <button type="button" class="filter-btn" data-genre="Action">Action</button>
        </div>
      </aside>
      <main class="content-area">
        <div class="search-wrap">
          <input id="search-input" type="text" placeholder="Search by movie title..." />
        </div>
        <p id="results-count" class="results-info"></p>
        <div id="card-container" class="movie-grid"></div>
      </main>
    </div>

    <div class="footer">
      <p class="footer-text">Snap Academies project — data from memory + IMDb</p>
    </div>

    <script src="scripts.js"></script>
  </body>
</html>
